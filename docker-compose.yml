version: "3.8"

services:
  freqtrade:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./user_data:/freqtrade/user_data
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - FREQTRADE_API_USER=${FREQTRADE_API_USER}
      - FREQTRADE_API_PASS=${FREQTRADE_API_PASS}
      - FREQTRADE_JWT_SECRET=${FREQTRADE_JWT_SECRET}
      # Optional Telegram
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
